<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Goel Cake House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cream) 0%,#f0e0cc 100%);padding:100px 24px 40px}
    .auth-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:440px;overflow:hidden}
    .auth-header{background:linear-gradient(135deg,var(--choco) 0%,var(--choco-mid) 100%);color:var(--cream);padding:32px;text-align:center}
    .auth-logo{font-size:2.5rem;margin-bottom:8px}
    .auth-header h1{font-family:var(--font-display);font-size:1.6rem;margin-bottom:4px}
    .auth-header p{font-size:.88rem;opacity:.75}
    .auth-tabs{display:flex;border-bottom:1px solid var(--border)}
    .auth-tab{flex:1;padding:14px;text-align:center;font-weight:600;font-size:.9rem;color:var(--text-muted);cursor:pointer;transition:var(--transition);border-bottom:2px solid transparent}
    .auth-tab.active{color:var(--rose);border-bottom-color:var(--rose)}
    .auth-body{padding:32px}
    .auth-form{display:none}
    .auth-form.active{display:block}
    .auth-footer{padding:20px 32px;border-top:1px solid var(--border);text-align:center;font-size:.85rem;color:var(--text-muted)}
    .auth-footer a{color:var(--rose);font-weight:600}
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">🎂</span><div class="logo-text"><span class="logo-main">Goel Cake House</span><span class="logo-sub">100% Eggless · Homemade</span></div></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html" class="nav-link">Home</a></li>
      <li><a href="products.html" class="nav-link">Products</a></li>
      <li><a href="cart.html" class="nav-link">Cart</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎂</div>
      <h1>Goel Cake House</h1>
      <p>Sign in to place orders &amp; track deliveries</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>
    <div class="auth-body">
      <!-- LOGIN -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" id="loginEmail" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" id="loginPassword" placeholder="••••••••" required/>
        </div>
        <div id="loginError" class="form-error" style="margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center" id="loginBtn">Login</button>
      </form>

      <!-- REGISTER -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" type="text" id="regName" placeholder="Your Name" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" id="regEmail" placeholder="you@email.com" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" type="tel" id="regPhone" placeholder="9876543210"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6"/>
        </div>
        <div id="regError" class="form-error" style="margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center" id="regBtn">Create Account</button>
      </form>
    </div>
    <div class="auth-footer">
      🔒 Your data is safe &amp; secure &nbsp;|&nbsp; <a href="../index.html">Back to Home</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').classList.toggle('active',tab==='login');
  document.getElementById('registerForm').classList.toggle('active',tab==='register');
}

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn'), err=document.getElementById('loginError');
  err.style.display='none'; btn.textContent='Logging in...'; btn.disabled=true;
  try {
    const {token,user} = await API.post('/auth/login',{email:document.getElementById('loginEmail').value,password:document.getElementById('loginPassword').value});
    Auth.save(token,user);
    UI.toast('Welcome back, '+user.name+'!','success');
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    setTimeout(()=>{ window.location.href = redirect || (user.role==='admin'?'admin.html':'../index.html'); },800);
  } catch(ex) {
    err.textContent=ex.message; err.style.display='block';
    btn.textContent='Login'; btn.disabled=false;
  }
}

async function handleRegister(e){
  e.preventDefault();
  const btn=document.getElementById('regBtn'), err=document.getElementById('regError');
  err.style.display='none'; btn.textContent='Creating...'; btn.disabled=true;
  try {
    const {token,user} = await API.post('/auth/register',{name:document.getElementById('regName').value,email:document.getElementById('regEmail').value,phone:document.getElementById('regPhone').value,password:document.getElementById('regPassword').value});
    Auth.save(token,user);
    UI.toast('Account created! Welcome, '+user.name+'!','success');
    setTimeout(()=>{ window.location.href='../index.html'; },800);
  } catch(ex) {
    err.textContent=ex.message; err.style.display='block';
    btn.textContent='Create Account'; btn.disabled=false;
  }
}

// Redirect if already logged in
document.addEventListener('DOMContentLoaded',()=>{
  if(Auth.isLoggedIn()) window.location.href='../index.html';
});
</script>
</body>
</html>
