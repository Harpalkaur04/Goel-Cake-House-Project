<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products | Goel Cake House</title>
  <meta name="description" content="Browse our full range of 100% eggless cakes, pastries, cookies and biscuits."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .products-page{padding-top:72px}
    .filters-bar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:72px;z-index:100}
    .filters-inner{display:flex;align-items:center;flex-wrap:wrap;gap:12px}
    .filter-search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 14px}
    .filter-search input{background:none;border:none;outline:none;padding:10px 0;flex:1;font-family:inherit;font-size:.9rem;color:var(--text)}
    .filter-select{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--white);font-family:inherit;font-size:.88rem;color:var(--text);cursor:pointer}
    .filter-select:focus{outline:none;border-color:var(--rose)}
    .price-range{display:flex;align-items:center;gap:6px}
    .price-range input{width:80px;padding:10px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.88rem;text-align:center}
    .filter-btn{padding:10px 18px;background:var(--rose);color:#fff;border-radius:var(--radius-sm);font-weight:600;font-size:.85rem;transition:var(--transition)}
    .filter-btn:hover{background:var(--rose-dark)}
    .filter-clear{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;color:var(--text-muted);transition:var(--transition)}
    .filter-clear:hover{border-color:var(--rose);color:var(--rose)}
    .products-layout{padding:40px 0 80px}
    .result-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .result-count{font-size:.9rem;color:var(--text-muted)}
    .pagination{display:flex;align-items:center;gap:8px;margin-top:48px;justify-content:center}
    .page-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;font-weight:500;transition:var(--transition);background:var(--white);cursor:pointer}
    .page-btn:hover{border-color:var(--rose);color:var(--rose)}
    .page-btn.active{background:var(--rose);color:#fff;border-color:var(--rose)}
  </style>
</head>
<body class="products-page">

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <span class="logo-icon">🎂</span>
      <div class="logo-text"><span class="logo-main">Goel Cake House</span><span class="logo-sub">100% Eggless · Homemade</span></div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html" class="nav-link">Home</a></li>
      <li><a href="products.html" class="nav-link active">Products</a></li>
      <li><a href="custom-cake.html" class="nav-link">Custom Cake</a></li>
      <li><a href="cart.html" class="nav-link cart-nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Cart <span class="cart-badge" id="cartBadge" style="display:none">0</span></a></li>
      <li id="authNavItem"><a href="login.html" class="nav-link nav-cta">Login</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Our Products</h1>
    <p>100% eggless, made fresh every day with love</p>
    <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><span>Products</span></div>
  </div>
</div>

<div class="filters-bar">
  <div class="container">
    <div class="filters-inner">
      <div class="filter-search">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search cakes, cookies..."/>
      </div>
      <select class="filter-select" id="filterCategory">
        <option value="all">All Categories</option>
        <option value="cakes">🎂 Cakes</option>
        <option value="pastries">🥐 Pastries</option>
        <option value="cookies">🍪 Cookies</option>
        <option value="biscuits">🫓 Biscuits</option>
      </select>
      <select class="filter-select" id="filterSort">
        <option value="">Sort: Default</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="popular">Most Popular</option>
      </select>
      <div class="price-range">
        <input type="number" id="filterMinPrice" placeholder="Min ₹"/>
        <span style="color:var(--text-muted)">–</span>
        <input type="number" id="filterMaxPrice" placeholder="Max ₹"/>
        <button class="filter-btn" id="applyPriceFilter">Go</button>
      </div>
      <button class="filter-clear" id="clearFilters">Clear All</button>
    </div>
  </div>
</div>

<div class="products-layout">
  <div class="container">
    <div class="result-meta">
      <span class="result-count" id="resultCount">Loading...</span>
    </div>
    <div class="products-grid" id="productsGrid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>
