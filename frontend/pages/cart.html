<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart | Goel Cake House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .cart-page{padding-top:72px}
    .cart-layout{padding:60px 0 80px}
    .cart-grid{display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start}
    .cart-items{display:flex;flex-direction:column;gap:16px}
    .cart-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:16px}
    .cart-item-img{width:88px;height:88px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--cream-dark)}
    .cart-item-info{flex:1}
    .cart-item-name{font-family:var(--font-display);font-size:1rem;color:var(--choco);margin-bottom:4px}
    .cart-item-cat{font-size:.75rem;color:var(--rose);text-transform:uppercase;font-weight:600;letter-spacing:.05em;margin-bottom:8px}
    .cart-item-price{font-weight:700;color:var(--choco);font-size:.95rem}
    .cart-qty{display:flex;align-items:center;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content}
    .cart-qty-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--rose);cursor:pointer;transition:var(--transition);background:none;border:none}
    .cart-qty-btn:hover{background:rgba(201,125,90,.08)}
    .cart-qty-val{width:40px;text-align:center;font-weight:700;font-size:.95rem;border:none;outline:none;background:none;font-family:inherit}
    .cart-item-remove{color:var(--text-muted);font-size:1.2rem;cursor:pointer;padding:4px;transition:var(--transition);background:none;border:none;flex-shrink:0}
    .cart-item-remove:hover{color:var(--error)}
    .cart-item-subtotal{text-align:right;flex-shrink:0}
    .cart-item-subtotal .label{font-size:.75rem;color:var(--text-muted);margin-bottom:2px}
    .cart-item-subtotal .amount{font-weight:700;color:var(--choco);font-size:1.05rem}
    .cart-summary{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:28px;position:sticky;top:100px}
    .summary-title{font-family:var(--font-display);font-size:1.3rem;color:var(--choco);margin-bottom:24px}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .summary-row:last-child{border-bottom:none}
    .summary-total{font-size:1.1rem;font-weight:700;color:var(--choco)}
    .summary-label{color:var(--text-muted);font-size:.9rem}
    .summary-val{font-weight:600;color:var(--choco)}
    .delivery-options{margin:20px 0}
    .delivery-options h4{font-size:.9rem;font-weight:600;color:var(--choco);margin-bottom:10px}
    .delivery-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;margin-bottom:8px;transition:var(--transition)}
    .delivery-opt:hover,.delivery-opt.selected{border-color:var(--rose);background:rgba(201,125,90,.06)}
    .delivery-opt input{accent-color:var(--rose)}
    .delivery-opt-info{flex:1}
    .delivery-opt-name{font-weight:600;font-size:.9rem;color:var(--choco)}
    .delivery-opt-desc{font-size:.78rem;color:var(--text-muted)}
    .wa-order-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
    @media(max-width:768px){.cart-grid{grid-template-columns:1fr}.cart-item{flex-wrap:wrap}.cart-summary{position:static}}
  </style>
</head>
<body class="cart-page">
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">🎂</span><div class="logo-text"><span class="logo-main">Goel Cake House</span><span class="logo-sub">100% Eggless · Homemade</span></div></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html" class="nav-link">Home</a></li>
      <li><a href="products.html" class="nav-link">Products</a></li>
      <li><a href="custom-cake.html" class="nav-link">Custom Cake</a></li>
      <li><a href="cart.html" class="nav-link active cart-nav-link">Cart <span class="cart-badge" id="cartBadge" style="display:none">0</span></a></li>
      <li id="authNavItem"><a href="login.html" class="nav-link nav-cta">Login</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Your Cart</h1>
    <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><span>Cart</span></div>
  </div>
</div>

<div class="cart-layout">
  <div class="container" id="cartContent">
    <div class="empty-state"><div class="empty-icon">🛒</div><h3>Loading cart...</h3></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
let deliveryType = 'pickup';

function renderCart(){
  const items = Cart.getAll();
  const content = document.getElementById('cartContent');
  if(!items.length){
    content.innerHTML=`<div class="empty-state"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Looks like you haven't added anything yet.</p><a href="products.html" class="btn btn-primary">Start Shopping</a></div>`;
    return;
  }
  const subtotal = Cart.getTotal();
  const dc = deliveryType==='delivery' && subtotal<CONFIG.FREE_DELIVERY_ABOVE ? CONFIG.DELIVERY_CHARGE : 0;
  const total = subtotal + dc;
  const waItems = items.map(i=>`${i.name} x${i.quantity} = ₹${i.price*i.quantity}`).join('\n');
  const waMsg = encodeURIComponent(`Hi! I want to place an order:\n\n${waItems}\n\nSubtotal: ₹${subtotal}\nDelivery: ${deliveryType}\nTotal: ₹${total}\n\nPlease confirm.`);

  content.innerHTML=`
    <div class="cart-grid">
      <div>
        <div class="cart-items">
          ${items.map(item=>`
            <div class="cart-item">
              <img class="cart-item-img" src="${item.image||'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=200'}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=200'"/>
              <div class="cart-item-info">
                <div class="cart-item-cat">${item.category}</div>
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">${UI.formatPrice(item.price)} each</div>
              </div>
              <div class="cart-qty">
                <button class="cart-qty-btn" onclick="changeQty('${item.productId}',${item.quantity-1})">−</button>
                <span class="cart-qty-val">${item.quantity}</span>
                <button class="cart-qty-btn" onclick="changeQty('${item.productId}',${item.quantity+1})">+</button>
              </div>
              <div class="cart-item-subtotal">
                <div class="label">Subtotal</div>
                <div class="amount">${UI.formatPrice(item.price*item.quantity)}</div>
              </div>
              <button class="cart-item-remove" onclick="removeItem('${item.productId}')" title="Remove">✕</button>
            </div>`).join('')}
        </div>
        <div style="margin-top:16px;display:flex;gap:12px">
          <a href="products.html" class="btn btn-outline btn-sm">← Continue Shopping</a>
          <button class="btn btn-sm" style="border:1.5px solid var(--border);color:var(--error)" onclick="clearCart()">🗑 Clear Cart</button>
        </div>
      </div>
      <div class="cart-summary">
        <h3 class="summary-title">Order Summary</h3>
        <div class="delivery-options">
          <h4>Delivery Option</h4>
          <label class="delivery-opt ${deliveryType==='pickup'?'selected':''}">
            <input type="radio" name="delivery" value="pickup" ${deliveryType==='pickup'?'checked':''} onchange="setDelivery('pickup')"/>
            <div class="delivery-opt-info">
              <div class="delivery-opt-name">🏪 Store Pickup</div>
              <div class="delivery-opt-desc">Free · Anaj Mandi, Jalandhar Cantt</div>
            </div>
          </label>
          <label class="delivery-opt ${deliveryType==='delivery'?'selected':''}">
            <input type="radio" name="delivery" value="delivery" ${deliveryType==='delivery'?'checked':''} onchange="setDelivery('delivery')"/>
            <div class="delivery-opt-info">
              <div class="delivery-opt-name">🚚 Home Delivery</div>
              <div class="delivery-opt-desc">${subtotal>=CONFIG.FREE_DELIVERY_ABOVE?'Free on orders above ₹'+CONFIG.FREE_DELIVERY_ABOVE:'₹'+CONFIG.DELIVERY_CHARGE+' · Free above ₹'+CONFIG.FREE_DELIVERY_ABOVE}</div>
            </div>
          </label>
        </div>
        <div class="summary-row"><span class="summary-label">Subtotal (${items.length} item${items.length>1?'s':''})</span><span class="summary-val">${UI.formatPrice(subtotal)}</span></div>
        <div class="summary-row"><span class="summary-label">Delivery Charge</span><span class="summary-val">${dc>0?UI.formatPrice(dc):'Free'}</span></div>
        <div class="summary-row"><span class="summary-label summary-total">Total</span><span class="summary-val summary-total">${UI.formatPrice(total)}</span></div>
        <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="proceedCheckout()">Proceed to Checkout</button>
          <a href="https://wa.me/919592285145?text=${waMsg}" target="_blank" class="btn btn-wa wa-order-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Order via WhatsApp
          </a>
        </div>
        <p style="font-size:.78rem;color:var(--text-muted);text-align:center;margin-top:12px">💳 Cash on Delivery &amp; Online Payment accepted</p>
      </div>
    </div>`;
}

function changeQty(id, n){ Cart.updateQty(id, n); renderCart(); }
function removeItem(id){ Cart.remove(id); renderCart(); UI.toast('Item removed from cart'); }
function clearCart(){ if(confirm('Clear your entire cart?')){ Cart.clear(); renderCart(); } }
function setDelivery(type){ deliveryType=type; renderCart(); }
function proceedCheckout(){
  if(!Auth.isLoggedIn()){ window.location.href='login.html?redirect='+encodeURIComponent(window.location.href); return; }
  alert('Order placement via API coming soon. For now, use the WhatsApp button below for instant ordering!');
}

document.addEventListener('DOMContentLoaded', renderCart);
window.addEventListener('cartUpdated', renderCart);
</script>
</body>
</html>
